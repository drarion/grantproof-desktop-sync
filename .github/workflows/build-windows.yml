name: Build Windows Desktop Sync

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --noconfirm --onefile --windowed --name GrantProofDesktopSync desktop_sync_app/main.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: GrantProofDesktopSync-windows
          path: dist/GrantProofDesktopSync.exe
